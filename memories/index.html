<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的回忆录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 胶片颗粒覆盖层 -->
    <div class="film-grain"></div>

    <!-- ========== 密码锁屏 ========== -->
    <section class="password-screen" id="password-screen">
        <div class="password-overlay"></div>
        <div class="password-card">
            <div class="password-icon">💕</div>
            <h2 class="password-title">这是只属于我们的秘密</h2>
            <p class="password-hint">输入我们约定的密码，开启回忆</p>
            <div class="password-input-group">
                <input
                    type="password"
                    id="password-input"
                    class="password-input"
                    placeholder="输入密码..."
                    maxlength="20"
                    autocomplete="off"
                >
                <button class="password-submit" id="password-submit">
                    <span>→</span>
                </button>
            </div>
            <p class="password-error" id="password-error"></p>
        </div>
    </section>

    <!-- ========== 封面页 ========== -->
    <section class="cover" id="cover">
        <!-- 花瓣粒子 -->
        <div class="petals-container" id="petals"></div>

        <!-- 柔光 -->
        <div class="cover-glow"></div>

        <!-- 轻暗角 -->
        <div class="cover-vignette"></div>

        <div class="cover-content">
            <!-- 顶部装饰 -->
            <div class="cover-ornament">
                <span class="ornament-flower">🌸</span>
            </div>

            <!-- 主标题 -->
            <h1 class="cover-title" id="cover-title"></h1>

            <!-- 爱心分割 -->
            <div class="cover-divider">
                <span class="divider-heart">♥</span>
            </div>

            <!-- 副标题 -->
            <p class="cover-subtitle" id="cover-subtitle"></p>

            <!-- 纪念日 -->
            <div class="cover-since">
                <span class="since-icon">💕</span>
                <span class="since-text">Since 2024</span>
            </div>
        </div>

        <!-- 进入按钮 -->
        <button class="enter-btn" id="enter-btn">
            <span class="enter-btn-text">翻 开 回 忆</span>
            <span class="enter-btn-heart">💌</span>
        </button>

        <p class="cover-hint">轻触以上 · 开启我们的故事</p>
    </section>

    <!-- ========== 主内容区 ========== -->
    <main class="main-content" id="main-content">
        <!-- 音乐播放器 -->
        <div class="music-player" id="music-player">
            <button class="music-btn playing" id="music-toggle" title="暂停/播放音乐">
                <span class="music-disc">💿</span>
                <span class="music-note">🎵</span>
            </button>
            <div class="music-info" id="music-info">
                <span class="music-title"></span>
                <span class="music-artist"></span>
            </div>
        </div>

        <!-- 回忆时间轴 -->
        <section class="timeline" id="timeline">
            <div class="timeline-line"></div>
            <!-- 由 JS 动态生成 -->
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <div class="footer-divider"></div>
            <p class="footer-text">❤️</p>
            <p class="footer-sub">我们的故事，未完待续...</p>
            <p class="footer-sub">添加新回忆：把照片放进 photos/ 文件夹，在 data.json 里新增一条记录即可</p>
        </footer>
    </main>

    <!-- 背景音乐 -->
    <audio id="bg-music" loop preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
